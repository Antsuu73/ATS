<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://www.google.com; script-src-elem 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://www.google.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data: blob:; connect-src 'self' https://*.googleapis.com https://*.google.com https://*.gstatic.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss://*.firebaseio.com; frame-src 'self' https://accounts.google.com https://*.firebaseapp.com https://www.google.com https://apis.google.com; base-uri 'self'; form-action 'self';">
    <title>Login ATS</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="login-card">

    <div class="logo">ATS</div>

    <h1 id="formTitle">Đăng nhập</h1>
    <p class="subtitle" id="formSubtitle">Đăng nhập để tiếp tục học</p>

    <!-- Tab switcher -->
    <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" type="button">Đăng nhập</button>
        <button class="auth-tab" id="tabRegister" type="button">Tạo tài khoản</button>
    </div>

    <!-- Email/Password Form -->
    <form id="emailForm" autocomplete="on">

        <!-- Register-only: Display name -->
        <div class="input-group" id="nameGroup" style="display:none;">
            <input type="text" id="displayName" placeholder="Tên hiển thị" autocomplete="name" maxlength="120">
        </div>

        <div class="input-group">
            <input type="email" id="emailInput" placeholder="Email" autocomplete="email" required>
        </div>

        <div class="input-group">
            <div class="password-wrapper">
                <input type="password" id="passwordInput" placeholder="Mật khẩu" autocomplete="current-password" required minlength="6">
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Hiện mật khẩu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Register-only: Confirm password -->
        <div class="input-group" id="confirmGroup" style="display:none;">
            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" autocomplete="new-password" minlength="6">
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Đăng nhập</button>
    </form>

    <!-- Divider -->
    <div class="divider">
        <span>hoặc</span>
    </div>

    <!-- Google Sign-In -->
    <button id="googleLogin" class="google-btn" type="button">
        <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:8px;">
            <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.9 33.1 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.2-2.7-.4-3.9z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.3 15.8 18.8 13 24 13c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.2 26.7 36 24 36c-5.4 0-9.9-3.6-11.3-8.5l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.2 5.2C36.6 39.5 44 34 44 24c0-1.3-.2-2.7-.4-3.9z"/>
        </svg>
        Đăng nhập với Google
    </button>

    <div id="status" role="status" aria-live="polite"></div>

    <a href="index.html" class="back-link">← Quay lại trang chủ</a>

</div>

    <script src="js/animations.js" defer></script>
    <script src="js/mobile-nav.js" defer></script>
    <script type="module" src="js/login.js"></script>

</body>
</html>
