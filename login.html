<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://apis.google.com https://www.google.com; script-src-elem 'self' https://www.gstatic.com https://apis.google.com https://www.google.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data: blob:; connect-src 'self' https://*.googleapis.com https://*.google.com https://*.gstatic.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss://*.firebaseio.com; frame-src 'self' https://accounts.google.com https://*.firebaseapp.com https://www.google.com https://apis.google.com; base-uri 'self'; form-action 'self';">
    <title>Login ATS</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>

<div class="login-card">

    <div class="logo">ATS</div>

    <h1>Welcome</h1>
    <p class="subtitle">Đăng nhập Google để tiếp tục học</p>

    <button id="googleLogin" class="google-btn" type="button">
        Đăng nhập với Google
    </button>

    <p class="login-note">Chỉ hỗ trợ đăng nhập Google. Dữ liệu được bảo vệ bởi Firebase Auth.</p>

    <div id="status" role="status" aria-live="polite"></div>

</div>

    <script src="js/animations.js" defer></script>
    <script src="js/mobile-nav.js" defer></script>
<script type="module" src="js/login.js"></script>

</body>
</html>
