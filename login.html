<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Login ATS</title>
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="login-card">

    <div class="logo">ATS</div>

    <h1>Welcome</h1>
    <p class="subtitle">Login to continue learning</p>

    <div class="input-group">
        <input id="name" placeholder="Name">
        <input id="username" placeholder="Username">
        <input id="class" placeholder="Class">
        <input id="password" type="password" placeholder="Password">
    </div>

    <button id="normalLogin" class="normal-btn">
        Login with Username
    </button>

    <button id="googleLogin" class="google-btn">
        Login with google
    </button>

    <div id="status"></div>

</div>

<script type="module" src="/js/login.js"></script>

</body>
</html>
