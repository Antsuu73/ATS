<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://apis.google.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data: blob:; connect-src 'self' https://*.googleapis.com https://*.google.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss://*.firebaseio.com; frame-src https://accounts.google.com https://*.firebaseapp.com https://www.google.com https://apis.google.com; base-uri 'self'; form-action 'self';">
    <title>Visualizers - ATS</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/problems.css">
    <link rel="stylesheet" href="css/visualizers.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">ATS</a>

            <nav class="nav-menu">
                <a href="index.html">Home</a>
                <a href="roadmaps.html">Roadmaps</a>
                <a href="lessons.html">Lessons</a>
                <a href="problems.html">Practice</a>
                <a href="visualizers.html" class="active">Visualizers</a>
            </nav>

            <div class="auth-area">
                <a href="login.html" class="btn-login" id="loginBtn">Login</a>
                <div id="userBox" class="user-box" style="display:none;">
                    <div id="userDisplay" class="user-display"></div>
                    <button id="logoutBtn" class="btn-logout" type="button">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="visualizers-page">
        <div class="container">

            <div class="visualizers-header">
                <h1>Algorithm Visualizers</h1>
                <p>
                    Xem thuật toán chạy trực quan — Play, Step hoặc Reset để điều khiển từng bước.
                </p>
            </div>

            <div class="lessons-toolbar">
                <input id="visualizersSearch" class="lessons-search" type="search"
                    placeholder="Tìm visualizer...">

                <div class="filter-group">
                    <button class="filter-btn active" data-filter="topic" data-value="all" type="button">Tất cả</button>
                    <button class="filter-btn" data-filter="topic" data-value="sorting" type="button">Sorting</button>
                    <button class="filter-btn" data-filter="topic" data-value="search" type="button">Search</button>
                    <button class="filter-btn" data-filter="topic" data-value="graph" type="button">Graph</button>
                </div>
            </div>

            <div id="visualizersGrid" class="visualizers-grid"></div>

        </div>
    </main>

    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/visualizers.js"></script>
</body>

</html>
