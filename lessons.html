<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài học - ATS</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/problems.css">
    <link rel="stylesheet" href="css/lessons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">ATS</a>

            <nav class="nav-menu">
                <a href="index.html">Home</a>
                <a href="roadmaps.html">Roadmaps</a>
                <a href="lessons.html" class="active">Lessons</a>
                <a href="problems.html">Practice</a>
                <a href="#">Visualizers</a>
            </nav>

            <div class="auth-area">
                <a href="login.html" class="btn-login" id="loginBtn">Login</a>
                <div id="userBox" class="user-box" style="display:none;">
                    <div id="userDisplay" class="user-display"></div>
                    <button id="logoutBtn" class="btn-logout" type="button">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="lessons-page">
        <div class="container">

            <div class="lessons-header">
                <h1>Algorithm Lessons</h1>
                <p>
                    Học lý thuyết thuật toán có hệ thống — từ cơ bản đến nâng cao,
                    kèm code mẫu và liên kết bài tập luyện tập.
                </p>
            </div>

            <div class="lessons-toolbar">
                <input id="lessonsSearch" class="lessons-search" type="search"
                    placeholder="Tìm bài học...">

                <div class="filter-group">
                    <button class="filter-btn active" data-filter="topic" data-value="all" type="button">Tất cả</button>
                    <button class="filter-btn" data-filter="topic" data-value="graph" type="button">Graph</button>
                    <button class="filter-btn" data-filter="topic" data-value="dp" type="button">DP</button>
                    <button class="filter-btn" data-filter="topic" data-value="tree" type="button">Tree</button>
                </div>
            </div>

            <div id="lessonsGrid" class="lessons-grid"></div>

        </div>
    </main>

    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/lessons.js"></script>
</body>

</html>
